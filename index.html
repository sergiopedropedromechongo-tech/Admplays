
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Admin Panel - Gerenciar Apps | MeuApp Store</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: #0a0c10;
            padding: 1.5rem;
        }

        .dashboard-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header Premium */
        .admin-header {
            background: linear-gradient(135deg, #1a1d24 0%, #0f1117 100%);
            border-radius: 1.5rem;
            padding: 1.2rem 2rem;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            border: 1px solid #2a2f3a;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .logo-area h1 {
            font-size: 1.7rem;
            font-weight: 800;
            background: linear-gradient(135deg, #60efff, #00b4ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo-area p {
            font-size: 0.8rem;
            color: #8e9aaf;
        }

        .header-actions {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .stats-card {
            background: #1e2430;
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            font-weight: 600;
            color: #60efff;
            border: 1px solid #2d3748;
        }

        .preview-btn {
            background: #2d3748;
            color: #e2e8f0;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 2rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            cursor: pointer;
            transition: 0.2s;
            text-decoration: none;
        }

        .preview-btn:hover {
            background: #374151;
            color: white;
        }

        .add-btn {
            background: linear-gradient(135deg, #00b4ff, #0080ff);
            color: white;
            border: none;
            padding: 0.7rem 1.5rem;
            border-radius: 2rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(0,180,255,0.3);
        }

        .add-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 16px rgba(0,180,255,0.4);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-card {
            background: #1a1d24;
            width: 90%;
            max-width: 550px;
            border-radius: 2rem;
            padding: 2rem;
            animation: fadeInUp 0.25s ease;
            border: 1px solid #2d3748;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px);}
            to { opacity: 1; transform: translateY(0);}
        }

        .modal-card h2 {
            margin-bottom: 1.5rem;
            font-weight: 700;
            color: #f0f3fa;
        }

        .modal-card input, .modal-card textarea {
            width: 100%;
            padding: 0.9rem 1rem;
            margin-bottom: 1rem;
            border: 1px solid #2d3748;
            border-radius: 1rem;
            font-size: 0.95rem;
            background: #0f1117;
            color: #e2e8f0;
            transition: 0.2s;
        }

        .modal-card input:focus, .modal-card textarea:focus {
            outline: none;
            border-color: #00b4ff;
            box-shadow: 0 0 0 3px rgba(0,180,255,0.2);
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .save-btn {
            background: linear-gradient(135deg, #00b4ff, #0080ff);
            color: white;
            padding: 0.7rem 1.8rem;
            border-radius: 2rem;
            border: none;
            font-weight: 600;
            cursor: pointer;
        }
        .cancel-btn {
            background: #2d3748;
            color: #e2e8f0;
            padding: 0.7rem 1.5rem;
            border-radius: 2rem;
            border: none;
            font-weight: 600;
            cursor: pointer;
        }

        /* Grid Apps Admin */
        .apps-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
            margin-top: 1.5rem;
        }

        .app-card {
            background: #13161f;
            border-radius: 1.5rem;
            overflow: hidden;
            border: 1px solid #262c38;
            transition: all 0.25s ease;
            display: flex;
            flex-direction: column;
        }

        .app-card:hover {
            border-color: #00b4ff;
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.4);
        }

        .app-img {
            width: 100%;
            height: 170px;
            object-fit: cover;
            background: #0a0c10;
            display: block;
        }

        .app-info {
            padding: 1.2rem;
        }

        .app-name {
            font-size: 1.3rem;
            font-weight: 700;
            color: #f0f3fa;
            margin-bottom: 0.5rem;
        }

        .app-desc {
            font-size: 0.85rem;
            color: #9ca3af;
            line-height: 1.4;
            margin-bottom: 0.8rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .app-link-preview {
            font-size: 0.75rem;
            color: #60efff;
            word-break: break-all;
            display: inline-block;
            margin-top: 0.3rem;
        }

        .card-actions {
            display: flex;
            justify-content: flex-end;
            gap: 0.8rem;
            padding: 0.8rem 1.2rem 1.2rem;
            border-top: 1px solid #262c38;
            margin-top: auto;
        }

        .edit-btn, .delete-btn {
            background: none;
            border: none;
            font-size: 0.85rem;
            cursor: pointer;
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            font-weight: 500;
            transition: 0.1s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .edit-btn {
            color: #60efff;
            background: #1e3a5f;
        }
        .delete-btn {
            color: #ff6b6b;
            background: #3b1e1e;
        }
        .edit-btn:hover { background: #2b4a7a; }
        .delete-btn:hover { background: #5c2a2a; }

        .empty-state {
            text-align: center;
            grid-column: 1 / -1;
            padding: 3rem;
            background: #13161f;
            border-radius: 1.5rem;
            color: #9ca3af;
            border: 1px solid #262c38;
        }

        .loader {
            text-align: center;
            padding: 3rem;
            color: #00b4ff;
        }

        footer {
            margin-top: 3rem;
            text-align: center;
            color: #5a6577;
            font-size: 0.8rem;
            padding: 1rem;
        }

        .success-toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #10b981;
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 2rem;
            font-weight: 500;
            z-index: 1100;
            animation: fadeInOut 2s ease;
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateY(20px);}
            15% { opacity: 1; transform: translateY(0);}
            85% { opacity: 1; transform: translateY(0);}
            100% { opacity: 0; transform: translateY(20px);}
        }
    </style>
</head>
<body>
<div class="dashboard-container">
    <div class="admin-header">
        <div class="logo-area">
            <h1><i class="fas fa-crown"></i> Admin Dashboard</h1>
            <p>Gerencie os apps que aparecem na vitrine do usuário</p>
        </div>
        <div class="header-actions">
            <div class="stats-card" id="totalAppsCount"><i class="fas fa-mobile-alt"></i> 0 apps</div>
            <button class="preview-btn" id="openVitrineBtn"><i class="fas fa-external-link-alt"></i> Ver Vitrine</button>
            <button class="add-btn" id="openAddModalBtn"><i class="fas fa-plus-circle"></i> Novo App</button>
        </div>
    </div>

    <div id="appsGrid" class="apps-grid">
        <div class="loader"><i class="fas fa-spinner fa-pulse"></i> Carregando seus aplicativos...</div>
    </div>
    <footer>
        <i class="fas fa-database"></i> Dados sincronizados com Firebase | Os apps aparecem instantaneamente na vitrine do usuário
    </footer>
</div>

<!-- Modal Adicionar/Editar -->
<div id="appModal" class="modal">
    <div class="modal-card">
        <h2 id="modalTitle"><i class="fas fa-plus-circle"></i> Adicionar Aplicativo</h2>
        <input type="text" id="appName" placeholder="Nome do App *" autocomplete="off">
        <textarea id="appDesc" rows="3" placeholder="Descrição do aplicativo (será vista pelo usuário)"></textarea>
        <input type="url" id="appImageUrl" placeholder="URL da imagem / ícone (link da foto)" autocomplete="off">
        <input type="url" id="appLink" placeholder="Link do APK / Play Store / Download *" autocomplete="off">
        <input type="hidden" id="editKey" value="">
        <div class="modal-actions">
            <button class="cancel-btn" id="closeModalBtn">Cancelar</button>
            <button class="save-btn" id="saveAppBtn">Salvar App</button>
        </div>
    </div>
</div>

<script>
    // === CONFIGURAÇÃO FIREBASE (baseada no google-services.json fornecido) ===
    const firebaseConfig = {
        apiKey: "AIzaSyA43U7ilw_-lkrFf9Z0oAf0drLUGSPOglo",
        authDomain: "painel-4f358.firebaseapp.com",
        databaseURL: "https://painel-4f358-default-rtdb.firebaseio.com",
        projectId: "painel-4f358",
        storageBucket: "painel-4f358.firebasestorage.app",
        messagingSenderId: "612093765239",
        appId: "1:612093765239:android:ac1dfc6a80fa4eaa8b8872"
    };

    // Inicializar Firebase
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const appsRef = database.ref('apps'); // nó 'apps' será lido pela vitrine do usuário

    // Elementos DOM
    const appsGrid = document.getElementById('appsGrid');
    const totalAppsSpan = document.getElementById('totalAppsCount');
    const openModalBtn = document.getElementById('openAddModalBtn');
    const openVitrineBtn = document.getElementById('openVitrineBtn');
    const modal = document.getElementById('appModal');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const saveAppBtn = document.getElementById('saveAppBtn');
    const modalTitle = document.getElementById('modalTitle');
    const appNameInput = document.getElementById('appName');
    const appDescInput = document.getElementById('appDesc');
    const appImageUrlInput = document.getElementById('appImageUrl');
    const appLinkInput = document.getElementById('appLink');
    const editKeyInput = document.getElementById('editKey');

    let currentEditId = null;

    // Função para mostrar toast
    function showToast(message) {
        const toast = document.createElement('div');
        toast.className = 'success-toast';
        toast.innerHTML = `<i class="fas fa-check-circle"></i> ${message}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

    // Abrir modal (create/edit)
    function openModal(editMode = false, appData = null, key = null) {
        if (!editMode) {
            modalTitle.innerHTML = '<i class="fas fa-plus-circle"></i> Adicionar Aplicativo';
            appNameInput.value = '';
            appDescInput.value = '';
            appImageUrlInput.value = '';
            appLinkInput.value = '';
            editKeyInput.value = '';
            currentEditId = null;
        } else {
            modalTitle.innerHTML = '<i class="fas fa-edit"></i> Editar Aplicativo';
            appNameInput.value = appData.name || '';
            appDescInput.value = appData.description || '';
            appImageUrlInput.value = appData.imageUrl || '';
            appLinkInput.value = appData.link || '';
            editKeyInput.value = key;
            currentEditId = key;
        }
        modal.style.display = 'flex';
    }

    function closeModalFunc() {
        modal.style.display = 'none';
        currentEditId = null;
    }

    // Salvar app (cria ou atualiza) - após salvar, o Firebase sincroniza automaticamente com a vitrine do usuário
    async function saveApp() {
        const name = appNameInput.value.trim();
        const description = appDescInput.value.trim();
        const imageUrl = appImageUrlInput.value.trim();
        const link = appLinkInput.value.trim();

        if (!name) {
            alert("❌ Por favor, informe o NOME do aplicativo.");
            return;
        }
        if (!link) {
            alert("❌ Informe o LINK do app (URL de download ou Play Store).");
            return;
        }

        const appObject = {
            name: name,
            description: description || "✨ Um aplicativo incrível para você!",
            imageUrl: imageUrl || "https://placehold.co/600x400/1a1d24/00b4ff?text=App+Image",
            link: link,
            updatedAt: firebase.database.ServerValue.TIMESTAMP
        };

        try {
            if (currentEditId) {
                await appsRef.child(currentEditId).update(appObject);
                showToast("✏️ App atualizado com sucesso! A vitrine será atualizada.");
            } else {
                await appsRef.push(appObject);
                showToast("✅ Novo app adicionado! Já disponível para os usuários.");
            }
            closeModalFunc();
        } catch (error) {
            console.error("Erro ao salvar:", error);
            alert("Erro ao salvar dados: " + error.message);
        }
    }

    // Deletar app
    async function deleteApp(key, appName) {
        if (confirm(`⚠️ Tem certeza que deseja remover "${appName}" permanentemente?\nO app sumirá da vitrine dos usuários.`)) {
            try {
                await appsRef.child(key).remove();
                showToast(`🗑️ "${appName}" removido com sucesso.`);
            } catch (error) {
                alert("Erro ao deletar: " + error.message);
            }
        }
    }

    // Renderizar grid do painel admin
    function renderAdminApps(appsData) {
        const appsArray = [];
        for (let key in appsData) {
            if (appsData.hasOwnProperty(key)) {
                appsArray.push({
                    id: key,
                    ...appsData[key]
                });
            }
        }
        // Ordenar por mais recente
        appsArray.sort((a,b) => (b.updatedAt || 0) - (a.updatedAt || 0));
        totalAppsSpan.innerHTML = `<i class="fas fa-mobile-alt"></i> ${appsArray.length} app${appsArray.length !== 1 ? 's' : ''}`;

        if (appsArray.length === 0) {
            appsGrid.innerHTML = `<div class="empty-state">
                <i class="fas fa-cloud-upload-alt" style="font-size: 3rem; color: #00b4ff;"></i>
                <h3 style="margin: 1rem 0 0.5rem; color: #e2e8f0;">Nenhum aplicativo cadastrado</h3>
                <p>Clique em "Novo App" para adicionar. Os apps aparecerão automaticamente na vitrine do usuário.</p>
            </div>`;
            return;
        }

        let html = '';
        appsArray.forEach(app => {
            const imgUrl = app.imageUrl && app.imageUrl !== '' ? app.imageUrl : 'https://placehold.co/600x400/1a1d24/00b4ff?text=App+Image';
            const safeLink = app.link && app.link.startsWith('http') ? app.link : (app.link ? 'https://' + app.link : '#');
            html += `
                <div class="app-card">
                    <img class="app-img" src="${escapeHtml(imgUrl)}" alt="${escapeHtml(app.name)}" onerror="this.src='https://placehold.co/600x400/ef4444/ffffff?text=Erro+Imagem'">
                    <div class="app-info">
                        <div class="app-name">${escapeHtml(app.name)}</div>
                        <div class="app-desc">${escapeHtml(app.description || 'Sem descrição')}</div>
                        <div class="app-link-preview"><i class="fas fa-link"></i> ${escapeHtml(safeLink.substring(0, 50))}${safeLink.length > 50 ? '...' : ''}</div>
                    </div>
                    <div class="card-actions">
                        <button class="edit-btn" data-id="${app.id}" data-name="${escapeHtml(app.name)}" data-desc="${escapeHtml(app.description || '')}" data-img="${escapeHtml(app.imageUrl || '')}" data-link="${escapeHtml(app.link || '')}">
                            <i class="fas fa-pen"></i> Editar
                        </button>
                        <button class="delete-btn" data-id="${app.id}" data-name="${escapeHtml(app.name)}">
                            <i class="fas fa-trash-alt"></i> Excluir
                        </button>
                    </div>
                </div>
            `;
        });
        appsGrid.innerHTML = html;

        // Eventos dos botões Editar
        document.querySelectorAll('.edit-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = btn.getAttribute('data-id');
                const appData = {
                    name: btn.getAttribute('data-name'),
                    description: btn.getAttribute('data-desc'),
                    imageUrl: btn.getAttribute('data-img'),
                    link: btn.getAttribute('data-link')
                };
                openModal(true, appData, id);
            });
        });

        // Eventos dos botões Excluir
        document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = btn.getAttribute('data-id');
                const name = btn.getAttribute('data-name');
                deleteApp(id, name);
            });
        });
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Listener em tempo real do Firebase - atualiza automaticamente o painel
    appsRef.on('value', (snapshot) => {
        const data = snapshot.val();
        renderAdminApps(data || {});
    }, (error) => {
        console.error("Erro Firebase:", error);
        appsGrid.innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-triangle"></i> Erro ao conectar ao Firebase: ${error.message}<br>Verifique sua conexão.</div>`;
    });

    // Eventos de UI
    openModalBtn.addEventListener('click', () => openModal(false));
    closeModalBtn.addEventListener('click', closeModalFunc);
    saveAppBtn.addEventListener('click', saveApp);
    window.addEventListener('click', (e) => { if (e.target === modal) closeModalFunc(); });

    // Botão para abrir a vitrine do usuário (mesmo domínio - ou nova aba)
    openVitrineBtn.addEventListener('click', () => {
        // Tenta abrir o arquivo vitrine.html na mesma pasta, se não existir, instrui o usuário
        window.open('vitrine.html', '_blank');
        // Caso queira mostrar uma mensagem alternativa caso o arquivo não exista ainda:
        setTimeout(() => {
            console.log("Certifique-se de que o arquivo 'vitrine.html' está no mesmo diretório que este painel.");
        }, 500);
    });

    // Mensagem de boas vindas
    console.log("🎮 Admin Panel conectado! Tudo que você adicionar aqui aparecerá na vitrine do usuário em tempo real.");
</script>
</body>
</html>
```
