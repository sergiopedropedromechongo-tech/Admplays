<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Admin Panel - Gerenciar Apps | MeuApp Store</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: #0a0c10;
            padding: 1.5rem;
        }

        .dashboard-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header Premium */
        .admin-header {
            background: linear-gradient(135deg, #1a1d24 0%, #0f1117 100%);
            border-radius: 1.5rem;
            padding: 1.2rem 2rem;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            border: 1px solid #2a2f3a;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .logo-area h1 {
            font-size: 1.7rem;
            font-weight: 800;
            background: linear-gradient(135deg, #60efff, #00b4ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo-area p {
            font-size: 0.8rem;
            color: #8e9aaf;
        }

        .header-actions {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .stats-card {
            background: #1e2430;
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            font-weight: 600;
            color: #60efff;
            border: 1px solid #2d3748;
        }

        .maintenance-btn, .dialog-btn {
            background: #2d3748;
            color: #e2e8f0;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 2rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .maintenance-btn.active {
            background: #dc2626;
            color: white;
        }

        .dialog-btn {
            background: linear-gradient(135deg, #00b4ff, #0080ff);
            color: white;
        }

        .add-btn {
            background: linear-gradient(135deg, #00b4ff, #0080ff);
            color: white;
            border: none;
            padding: 0.7rem 1.5rem;
            border-radius: 2rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(0,180,255,0.3);
        }

        .add-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 16px rgba(0,180,255,0.4);
        }

        /* Modais */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-card {
            background: #1a1d24;
            width: 90%;
            max-width: 550px;
            border-radius: 2rem;
            padding: 2rem;
            animation: fadeInUp 0.25s ease;
            border: 1px solid #2d3748;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px);}
            to { opacity: 1; transform: translateY(0);}
        }

        .modal-card h2 {
            margin-bottom: 1.5rem;
            font-weight: 700;
            color: #f0f3fa;
        }

        .modal-card input, .modal-card textarea, .modal-card select {
            width: 100%;
            padding: 0.9rem 1rem;
            margin-bottom: 1rem;
            border: 1px solid #2d3748;
            border-radius: 1rem;
            font-size: 0.95rem;
            background: #0f1117;
            color: #e2e8f0;
            transition: 0.2s;
        }

        .modal-card input:focus, .modal-card textarea:focus, .modal-card select:focus {
            outline: none;
            border-color: #00b4ff;
            box-shadow: 0 0 0 3px rgba(0,180,255,0.2);
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .save-btn {
            background: linear-gradient(135deg, #00b4ff, #0080ff);
            color: white;
            padding: 0.7rem 1.8rem;
            border-radius: 2rem;
            border: none;
            font-weight: 600;
            cursor: pointer;
        }
        .cancel-btn {
            background: #2d3748;
            color: #e2e8f0;
            padding: 0.7rem 1.5rem;
            border-radius: 2rem;
            border: none;
            font-weight: 600;
            cursor: pointer;
        }

        /* Status badge */
        .status-badge {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 1rem;
            font-size: 0.7rem;
            font-weight: 500;
        }
        .status-online { background: #10b981; color: white; }
        .status-maintenance { background: #dc2626; color: white; }

        /* Grid Apps Admin */
        .apps-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
            margin-top: 1.5rem;
        }

        .app-card {
            background: #13161f;
            border-radius: 1.5rem;
            overflow: hidden;
            border: 1px solid #262c38;
            transition: all 0.25s ease;
            display: flex;
            flex-direction: column;
        }

        .app-card:hover {
            border-color: #00b4ff;
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.4);
        }

        .app-img {
            width: 100%;
            height: 170px;
            object-fit: cover;
            background: #0a0c10;
            display: block;
        }

        .app-info {
            padding: 1.2rem;
        }

        .app-name {
            font-size: 1.3rem;
            font-weight: 700;
            color: #f0f3fa;
            margin-bottom: 0.5rem;
        }

        .app-desc {
            font-size: 0.85rem;
            color: #9ca3af;
            line-height: 1.4;
            margin-bottom: 0.8rem;
        }

        .card-actions {
            display: flex;
            justify-content: flex-end;
            gap: 0.8rem;
            padding: 0.8rem 1.2rem 1.2rem;
            border-top: 1px solid #262c38;
            margin-top: auto;
        }

        .edit-btn, .delete-btn {
            background: none;
            border: none;
            font-size: 0.85rem;
            cursor: pointer;
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            font-weight: 500;
            transition: 0.1s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .edit-btn {
            color: #60efff;
            background: #1e3a5f;
        }
        .delete-btn {
            color: #ff6b6b;
            background: #3b1e1e;
        }
        .edit-btn:hover { background: #2b4a7a; }
        .delete-btn:hover { background: #5c2a2a; }

        .empty-state {
            text-align: center;
            grid-column: 1 / -1;
            padding: 3rem;
            background: #13161f;
            border-radius: 1.5rem;
            color: #9ca3af;
            border: 1px solid #262c38;
        }

        .loader {
            text-align: center;
            padding: 3rem;
            color: #00b4ff;
        }

        footer {
            margin-top: 3rem;
            text-align: center;
            color: #5a6577;
            font-size: 0.8rem;
            padding: 1rem;
        }

        .toggle-switch {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        .toggle-switch label {
            color: white;
        }
    </style>
</head>
<body>
<div class="dashboard-container">
    <div class="admin-header">
        <div class="logo-area">
            <h1><i class="fas fa-crown"></i> Admin Dashboard</h1>
            <p>Gerencie os apps e sistema</p>
        </div>
        <div class="header-actions">
            <div class="stats-card" id="totalAppsCount"><i class="fas fa-mobile-alt"></i> 0 apps</div>
            <button class="maintenance-btn" id="maintenanceBtn"><i class="fas fa-tools"></i> Modo Manutenção</button>
            <button class="dialog-btn" id="dialogBtn"><i class="fas fa-comment-dots"></i> Enviar Diálogo</button>
            <button class="add-btn" id="openAddModalBtn"><i class="fas fa-plus-circle"></i> Novo App</button>
        </div>
    </div>

    <div id="appsGrid" class="apps-grid">
        <div class="loader"><i class="fas fa-spinner fa-pulse"></i> Carregando seus aplicativos...</div>
    </div>
    <footer>
        <i class="fas fa-database"></i> Dados sincronizados com Firebase
    </footer>
</div>

<!-- Modal Adicionar/Editar App -->
<div id="appModal" class="modal">
    <div class="modal-card">
        <h2 id="modalTitle"><i class="fas fa-plus-circle"></i> Adicionar Aplicativo</h2>
        <input type="text" id="appName" placeholder="Nome do App *" autocomplete="off">
        <textarea id="appDesc" rows="3" placeholder="Descrição do aplicativo"></textarea>
        <input type="url" id="appImageUrl" placeholder="URL da imagem / ícone" autocomplete="off">
        <input type="url" id="appLink" placeholder="Link do APK / Download *" autocomplete="off">
        <input type="hidden" id="editKey" value="">
        <div class="modal-actions">
            <button class="cancel-btn" id="closeModalBtn">Cancelar</button>
            <button class="save-btn" id="saveAppBtn">Salvar App</button>
        </div>
    </div>
</div>

<!-- Modal Diálogo/Notificação -->
<div id="dialogModal" class="modal">
    <div class="modal-card">
        <h2><i class="fas fa-comment-dots"></i> Enviar Notificação</h2>
        <input type="text" id="dialogTitle" placeholder="Título da notificação *">
        <textarea id="dialogMessage" rows="4" placeholder="Mensagem da notificação *"></textarea>
        <select id="dialogType">
            <option value="info">ℹ️ Informação</option>
            <option value="success">✅ Sucesso</option>
            <option value="warning">⚠️ Aviso</option>
            <option value="error">❌ Erro</option>
        </select>
        <div class="modal-actions">
            <button class="cancel-btn" id="closeDialogBtn">Cancelar</button>
            <button class="save-btn" id="sendDialogBtn">Enviar Notificação</button>
        </div>
    </div>
</div>

<!-- Modal Manutenção -->
<div id="maintenanceModal" class="modal">
    <div class="modal-card">
        <h2><i class="fas fa-tools"></i> Modo Manutenção</h2>
        <div class="toggle-switch">
            <label>Status atual:</label>
            <span id="currentStatus" class="status-badge status-online">Online</span>
        </div>
        <textarea id="maintenanceMessage" rows="3" placeholder="Mensagem para os usuários (ex: Estamos em manutenção, volte em breve!)"></textarea>
        <div class="modal-actions">
            <button class="cancel-btn" id="closeMaintenanceBtn">Cancelar</button>
            <button class="save-btn" id="saveMaintenanceBtn">Aplicar</button>
        </div>
    </div>
</div>

<script>
    // === CONFIGURAÇÃO FIREBASE ===
    const firebaseConfig = {
        apiKey: "AIzaSyA43U7ilw_-lkrFf9Z0oAf0drLUGSPOglo",
        authDomain: "painel-4f358.firebaseapp.com",
        databaseURL: "https://painel-4f358-default-rtdb.firebaseio.com",
        projectId: "painel-4f358",
        storageBucket: "painel-4f358.firebasestorage.app",
        messagingSenderId: "612093765239",
        appId: "1:612093765239:android:ac1dfc6a80fa4eaa8b8872"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const appsRef = database.ref('apps');
    const systemRef = database.ref('system');

    // Elementos DOM
    const appsGrid = document.getElementById('appsGrid');
    const totalAppsSpan = document.getElementById('totalAppsCount');
    const openModalBtn = document.getElementById('openAddModalBtn');
    const modal = document.getElementById('appModal');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const saveAppBtn = document.getElementById('saveAppBtn');
    const modalTitle = document.getElementById('modalTitle');
    const appNameInput = document.getElementById('appName');
    const appDescInput = document.getElementById('appDesc');
    const appImageUrlInput = document.getElementById('appImageUrl');
    const appLinkInput = document.getElementById('appLink');
    const editKeyInput = document.getElementById('editKey');

    // Diálogo
    const dialogModal = document.getElementById('dialogModal');
    const openDialogBtn = document.getElementById('dialogBtn');
    const closeDialogBtn = document.getElementById('closeDialogBtn');
    const sendDialogBtn = document.getElementById('sendDialogBtn');
    const dialogTitle = document.getElementById('dialogTitle');
    const dialogMessage = document.getElementById('dialogMessage');
    const dialogType = document.getElementById('dialogType');

    // Manutenção
    const maintenanceModal = document.getElementById('maintenanceModal');
    const maintenanceBtn = document.getElementById('maintenanceBtn');
    const closeMaintenanceBtn = document.getElementById('closeMaintenanceBtn');
    const saveMaintenanceBtn = document.getElementById('saveMaintenanceBtn');
    const maintenanceMessage = document.getElementById('maintenanceMessage');
    const currentStatusSpan = document.getElementById('currentStatus');

    let currentEditId = null;

    // ========== GERENCIAR APPS ==========
    function openModal(editMode = false, appData = null, key = null) {
        if (!editMode) {
            modalTitle.innerHTML = '<i class="fas fa-plus-circle"></i> Adicionar Aplicativo';
            appNameInput.value = '';
            appDescInput.value = '';
            appImageUrlInput.value = '';
            appLinkInput.value = '';
            editKeyInput.value = '';
            currentEditId = null;
        } else {
            modalTitle.innerHTML = '<i class="fas fa-edit"></i> Editar Aplicativo';
            appNameInput.value = appData.name || '';
            appDescInput.value = appData.description || '';
            appImageUrlInput.value = appData.imageUrl || '';
            appLinkInput.value = appData.link || '';
            editKeyInput.value = key;
            currentEditId = key;
        }
        modal.style.display = 'flex';
    }

    function closeModalFunc() {
        modal.style.display = 'none';
        currentEditId = null;
    }

    async function saveApp() {
        const name = appNameInput.value.trim();
        const description = appDescInput.value.trim();
        const imageUrl = appImageUrlInput.value.trim();
        const link = appLinkInput.value.trim();

        if (!name) { alert("❌ Digite o nome do aplicativo."); return; }
        if (!link) { alert("❌ Informe o link do APK."); return; }

        const appObject = {
            name: name,
            description: description || "Sem descrição",
            imageUrl: imageUrl || null,
            link: link,
            updatedAt: Date.now()
        };

        try {
            if (currentEditId) {
                await appsRef.child(currentEditId).update(appObject);
                showToast("✏️ App atualizado!");
            } else {
                await appsRef.push(appObject);
                showToast("✅ Novo app adicionado!");
            }
            closeModalFunc();
        } catch (error) {
            alert("Erro ao salvar: " + error.message);
        }
    }

    async function deleteApp(key, appName) {
        if (confirm(`⚠️ Remover "${appName}" permanentemente?`)) {
            try {
                await appsRef.child(key).remove();
                showToast(`🗑️ "${appName}" removido.`);
            } catch (error) {
                alert("Erro ao deletar: " + error.message);
            }
        }
    }

    function renderAdminApps(appsData) {
        const appsArray = [];
        for (let key in appsData) {
            if (appsData.hasOwnProperty(key)) {
                appsArray.push({ id: key, ...appsData[key] });
            }
        }
        appsArray.sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));
        totalAppsSpan.innerHTML = `<i class="fas fa-mobile-alt"></i> ${appsArray.length} app${appsArray.length !== 1 ? 's' : ''}`;

        if (appsArray.length === 0) {
            appsGrid.innerHTML = `<div class="empty-state"><i class="fas fa-cloud-upload-alt" style="font-size: 3rem; color: #00b4ff;"></i><h3 style="margin: 1rem 0 0.5rem; color: #e2e8f0;">Nenhum aplicativo cadastrado</h3><p>Clique em "Novo App" para adicionar.</p></div>`;
            return;
        }

        let html = '';
        appsArray.forEach(app => {
            const imgUrl = app.imageUrl || 'https://placehold.co/600x400/1a1d24/00b4ff?text=App+Image';
            html += `
                <div class="app-card">
                    <img class="app-img" src="${escapeHtml(imgUrl)}" alt="${escapeHtml(app.name)}" onerror="this.src='https://placehold.co/600x400/ef4444/ffffff?text=Erro'">
                    <div class="app-info">
                        <div class="app-name">${escapeHtml(app.name)}</div>
                        <div class="app-desc">${escapeHtml(app.description || 'Sem descrição')}</div>
                    </div>
                    <div class="card-actions">
                        <button class="edit-btn" data-id="${app.id}" data-name="${escapeHtml(app.name)}" data-desc="${escapeHtml(app.description || '')}" data-img="${escapeHtml(app.imageUrl || '')}" data-link="${escapeHtml(app.link || '')}"><i class="fas fa-pen"></i> Editar</button>
                        <button class="delete-btn" data-id="${app.id}" data-name="${escapeHtml(app.name)}"><i class="fas fa-trash-alt"></i> Excluir</button>
                    </div>
                </div>
            `;
        });
        appsGrid.innerHTML = html;

        document.querySelectorAll('.edit-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const id = btn.getAttribute('data-id');
                const appData = {
                    name: btn.getAttribute('data-name'),
                    description: btn.getAttribute('data-desc'),
                    imageUrl: btn.getAttribute('data-img'),
                    link: btn.getAttribute('data-link')
                };
                openModal(true, appData, id);
            });
        });

        document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const id = btn.getAttribute('data-id');
                const name = btn.getAttribute('data-name');
